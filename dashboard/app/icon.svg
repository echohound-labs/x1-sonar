<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- dark circle background (--bg) -->
  <circle cx="32" cy="32" r="32" fill="#060b16"/>
  <!-- sweep wedge in the accent, fading out (--ping) -->
  <defs>
    <linearGradient id="sweep" x1="32" y1="32" x2="52" y2="14" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2be4d2" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2be4d2" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <path d="M32 32 L32 6 A26 26 0 0 1 54 19 Z" fill="url(#sweep)"/>
  <!-- concentric rings (--ping-dim / --ping) -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#1a9c90" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="16" fill="none" stroke="#1a9c90" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="8"  fill="none" stroke="#1a9c90" stroke-width="1.5"/>
  <!-- sweep leading edge -->
  <line x1="32" y1="32" x2="32" y2="6" stroke="#2be4d2" stroke-width="2" stroke-linecap="round"/>
  <!-- center hub -->
  <circle cx="32" cy="32" r="2.5" fill="#2be4d2"/>
  <!-- blip dots -->
  <circle cx="44" cy="22" r="2.5" fill="#2be4d2"/>
  <circle cx="22" cy="42" r="2" fill="#2be4d2" fill-opacity="0.8"/>
</svg>
