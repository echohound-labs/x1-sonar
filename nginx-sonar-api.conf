# /etc/nginx/sites-available/sonar-api
# Rate limit: 10 req/s per IP with burst of 20 — generous for a dashboard,
# hostile to scrapers. (limit_req_zone is valid here: this file is included
# inside the http{} block.)
limit_req_zone $binary_remote_addr zone=sonar_api:10m rate=10r/s;

server {
    listen 80;
    server_name sonar-api.x1forge.xyz;

    location / {
        limit_req zone=sonar_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
# certbot --nginx -d sonar-api.x1forge.xyz will add the TLS server block.
